description: >- # this means to ignore newlines until "baseurl:"
 Google Cloud Certified Professional Machine Learning Engineer with 6+ years of experience turning raw data into scalable data platforms and ML-powered insights on GCP. I enjoy tackling complex data challenges—from building and evolving production ETL pipelines for Fortune 500 retail analytics to exploring hybrid forecasting models and contributing to product discovery solutions and search relevance improvements for a global luxury ecommerce platform using catalog ingestion and Vertex AI Search for Commerce. My work has delivered measurable impact, including reducing cloud costs by $2K/month and automating data workflows that cut processing time by 85%. I value collaborative problem-solving and delivering reliable data products that stakeholders trust for decision-making.

