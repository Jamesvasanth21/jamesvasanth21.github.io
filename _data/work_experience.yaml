merkle:
  company_name: Merkle
  company_logo: "CLogo-Merkle.png"
  duration: "March, 2022 - October, 2025"
  designation: Senior Software Engineer
  company_url: "https://www.merkle.com/"
  short_description: "Built and evolved production-grade ETL pipelines for Fortune 500 retail analytics, while developing hybrid forecasting models for retail sales using BigQuery ML and various ML models."
  detailed_description:
    - Data Product Development & Enhancement
      - Contributed as a Data Engineer to a large-scale ecommerce analytics platform supporting a Fortune 500 retailer, delivering incremental features and improvements to existing data products used by analysts and business teams.
      - Enhanced and maintained production ETL pipelines (Java, Python, PySpark, GCP) powering datasets such as Orders, Sales, Adobe Clickstream, Bazaarvoice reviews, and Qualtrics sentiment data.
      - Partnered with business analysts and product stakeholders to understand reporting gaps, implement new transformations, and ensure data availability for decision-making.
    - Business Support & Data Reliability
      - Investigated and resolved data discrepancies raised by business users, performing root-cause analysis across ingestion, transformation, and semantic layers to maintain trust in analytics outputs.
      - Supported ad-hoc data requests and analytical questions by tracing lineage, validating metrics, and coordinating fixes across upstream systems.
      - Managed production releases and monitored ETL workflows to ensure SLA adherence, data freshness, and pipeline stability.
    - Semantic Layer & Performance Optimization
      - Maintained and enhanced AtScale semantic cubes, introducing new measures, dimensions, and modeling improvements to support evolving reporting needs.
      - Developed a Python/Flask automation tool to audit unused cube aggregates, reducing build time by 50% and lowering BigQuery compute costs.
      - Implemented BigQuery partitioning and clustering strategies to improve query performance for downstream BI tools and frontend applications.
    - Cloud Migration & Cost Optimization
      - Migrated multiple ETL services from App Engine to Cloud Run + Jenkins, improving deployment consistency and reducing operational overhead.
      - Led migration of a GoLang Bazaarvoice ingestion pipeline, delivering $2K/month cost savings while improving execution reliability.
      - Contributed to infrastructure optimization initiatives, including dynamic scaling of AtScale servers during off-peak periods.
    - Machine Learning & Analytics Enablement
      - Developed time-series forecasting models for key ecommerce metrics and integrated automated anomaly detection into daily ETL workflows.
      - Built a Streamlit dashboard to visualize forecast trends and anomalies, improving transparency and stakeholder understanding of data behavior.
  visibility: true

