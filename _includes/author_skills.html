{% if site.author_skills and site.author_skills.size > 0 %}
<table id="skills-table" class="table table-sm table-borderless mb-0">
  <tbody>
    {% for skill_group in site.author_skills %}
    {% if skill_group.visibility != false %}
    <tr>
      <th scope="row">{{ skill_group.heading }}</th>
      <td>{{ skill_group.skills }}</td>
    </tr>
    {% endif %}
    {% endfor %}
  </tbody>
</table>
{% endif %}
